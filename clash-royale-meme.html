<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Clash Royale Style Game</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }\n        #game { background: #fff; border: 1px solid #ccc; width: 600px; height: 400px; position: relative; }\n        .card { width: 100px; height: 150px; margin: 10px; display: inline-block; cursor: pointer; }\n        .pepe { background-image: url('path_to_pepe_image'); }\n        .pinguin { background-image: url('path_to_pinguin_image'); }\n        .pepa { background-image: url('path_to_pepa_image'); }\n    </style>\n</head>\n<body>\n    <div id="game">\n        <div class="card pepe" onclick="deployCharacter('Pepe Frosch')">Pepe Frosch</div>\n        <div class="card pinguin" onclick="deployCharacter('Pinguin')">Pinguin</div>\n        <div class="card pepa" onclick="deployCharacter('Pepa Schweine')">Pepa Schweine</div>\n    </div>\n    <script>\n        function deployCharacter(name) {\n            const gameArea = document.getElementById('game');\n            const newCharacter = document.createElement('div');\n            newCharacter.innerText = name;\n            newCharacter.style.position = 'absolute';\n            newCharacter.style.bottom = '0';\n            newCharacter.style.left = Math.random() * (gameArea.clientWidth - 100) + 'px';\n            gameArea.appendChild(newCharacter);\n            console.log(name + ' deployed!');\n        }\n    </script>\n</body>\n</html>
